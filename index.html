<script>

};
// registra sudoku internamente
function registraSudoku() {
    // Trasformiamo la matrice in una stringa JSON per salvarla facilmente
    localStorage.setItem('sudoku_save', JSON.stringify(mat));
    console.log("Sudoku salvato nel browser!");
}

// Per recuperarlo:
// let datiCaricati = JSON.parse(localStorage.getItem('sudoku_save'));

//  Salva Sudoku
function salvaSudoku() {
    let contenuto = "";
    let mat = getMatriceDallaGriglia();
    
    // Ciclo identico al tuo for in C++
    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            // Aggiungiamo il numero e il ritorno a capo \n
            contenuto += ` ${mat[i][j]}\n`;
        }
    }

    // Creiamo un file virtuale (Blob)
    const blob = new Blob([contenuto], { type: 'text/plain' });
    const link = document.createElement("a");
    
    link.href = URL.createObjectURL(blob);
    link.download = "sudoku.sav"; // Il nome del file
    link.click(); // Avvia il download
    
    // Pulizia
    URL.revokeObjectURL(link.href);
}
//  Legge il file sudoku.sav
function caricaSudoku(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        const contenuto = e.target.result;
        
        // Trasformiamo la stringa in un array di numeri
        // .split(/\s+/) divide la stringa ogni volta che trova spazi o invii (\n)
        // .filter(x => x.length > 0) rimuove eventuali spazi vuoti
        const numeri = contenuto.trim().split(/\s+/).map(Number);

        if (numeri.length !== 81) {
            alert("Errore: Il file non contiene 81 numeri!");
            return;
        }

        // Ricostruiamo la matrice 9x9
        let nuovaMatrice = [];
        for (let i = 0; i < 9; i++) {
            // Prendiamo una fetta di 9 numeri alla volta
            nuovaMatrice.push(numeri.slice(i * 9, (i * 9) + 9));
        }

        // Ora 'nuovaMatrice' è pronta! 
        // Puoi assegnarla alla tua variabile globale o aggiornare l'interfaccia
        console.log("Matrice caricata:", nuovaMatrice);
        scriviMatriceSuGriglia(nuovaMatrice,nuovaMatrice,"black"); 
		// Resetta il valore dell'input così puoi ricaricare lo stesso file
		event.target.value = "";
    };
    reader.readAsText(file);
}
// 1. Legge la griglia HTML e crea una matrice numerica

function getMatriceDallaGriglia() {
    let mat = [];
    for (let r = 0; r < 9; r++) {
        mat[r] = [];
        for (let c = 0; c < 9; c++) {
            let id = `cell-${r}-${c}`; // Definiamo l'id
            let el = document.getElementById(id);
            let v = "";

            if (el) {
                v = el.value; 
            } else {
                console.error("ERRORE CRITICO: Manca l'elemento HTML con ID: " + id);
                // Non possiamo leggere .value se el è null, quindi v resta ""
            }

            // Trasformiamo il valore in numero (0 se vuoto o non valido)
            mat[r][c] = (v === "" || isNaN(parseInt(v))) ? 0 : parseInt(v);
        }
    }
    return mat;
}


// 2. Scrive la matrice sulla griglia HTML con colori diversi per i candidati
function scriviMatriceSuGriglia(mat,mat_old,color) {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            let input = document.getElementById(`cell-${r}-${c}`);
            if (mat[r][c] === 0) {
                input.value = "";
                input.style.color = "black";
                input.style.fontSize = "22px";
            } else if (mat[r][c] > 9) {
                input.value = mat[r][c];
                input.style.color = "blue";
                input.style.fontSize = "11px"; // Più piccolo perché ci sono più cifre
            } else if (mat[r][c] == mat_old[r][c]) {
                input.value = mat[r][c];
                input.style.color = "black";
                input.style.fontSize = "22px"; 
            } else {
                input.value = mat[r][c];
                input.style.color = color;
                input.style.fontSize = "22px";
            }
        }
    }
}

// 3. LOGICA PORTING BORLAND 6

function eseguiGiro() {
	
	aggiornaStatoDallaMaschera(); // Carica tutto in 'state'
	//inizializzaStatoSudoku(); // Carica tutto in 'state'
    
    let mat = getMatriceDallaGriglia();
    let memo = document.getElementById("memo1");
	let mat_old;

	// Copia il CONTENUTO, non il riferimento
	mat_old = structuredClone(mat);
    // Ora usiamo state.singoliChecked invece di cercarlo ogni volta
    //let okPrint = state.singoliChecked;	
    //let okPrint = true;	
	
    // 1. Sincronizziamo lo stato con le checkbox della maschera
    //aggiornaStatoDallaMaschera(); 

    //let mat = getMatriceDallaGriglia();
    //let memo = document.getElementById("memo1");
   
    // Usiamo lo state globale invece di variabili locali
    if (state.numop === 0) memo.value = ""; // Pulisce solo all'inizio del primo giro

    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            let num = mat[i][j];
            
            // Se la cella è vuota (0) o contiene candidati (es. 125)
            if (num === 0 || num > 9) {
                // Utilizziamo la tua funzione decodifica ufficiale
                let possib = decodifica(num); 
                
                // Se era 0, inizializziamo a 123456789
                if (num === 0) {
                    possib = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
                }

                // --- LOGICA DI FILTRAGGIO ---
                // (Resta valida, ma usiamo la funzione eliminaDaPossib per coerenza)
                
                // Controllo Riga
                for (let jj = 0; jj < 9; jj++) {
                    if (jj !== j && mat[i][jj] > 0 && mat[i][jj] < 10) {
                        possib = eliminaDaPossib(possib, mat[i][jj]);
                    }
                }
                // Controllo Colonna
                for (let ii = 0; ii < 9; ii++) {
                    if (ii !== i && mat[ii][j] > 0 && mat[ii][j] < 10) {
                        possib = eliminaDaPossib(possib, mat[ii][j]);
                    }
                }
                // Controllo Quadrato
                let imin = 3 * Math.floor(i / 3), jmin = 3 * Math.floor(j / 3);
                for (let ii = imin; ii < imin + 3; ii++) {
                    for (let jj = jmin; jj < jmin + 3; jj++) {
                        if ((ii !== i || jj !== j) && mat[ii][jj] > 0 && mat[ii][jj] < 10) {
                            possib = eliminaDaPossib(possib, mat[ii][jj]);
                        }
                    }
                }

                // Ricostruisce il numero usando la funzione ufficiale
                let nuovoNum = codifica(possib);

                // --- LOGGING CON LO STATO ---
                // Controlliamo se la cella è diventata un "singolo" (una sola cifra rimasta)
                if (nuovoNum > 0 && nuovoNum < 10 && nuovoNum !== mat[i][j]) {
                    //if (state.singoliChecked) { // Usiamo lo stato!
                        state.numop++;
                        memo.value += `${state.numop}- Sola possib.: ${nuovoNum} in riga ${i+1}-col. ${j+1}\n`;
                        memo.scrollTop = memo.scrollHeight;
                    //}
                }
                mat[i][j] = nuovoNum;
            }
        }
    }
    scriviMatriceSuGriglia(mat,mat_old,"green");
}

// Rinominiamo la tua funzione logica per chiarezza
function elaborazioneNpleCore(mat, sudokuState) {
    const quad = [
        [0, 3, 0, 3], [0, 3, 3, 6], [0, 3, 6, 9],
        [3, 6, 0, 3], [3, 6, 3, 6], [3, 6, 6, 9],
        [6, 9, 0, 3], [6, 9, 3, 6], [6, 9, 6, 9]
    ];

    if (sudokuState.righeChecked) {
        for (let i = 0; i < 9; i++) {
            cercaNplette(i, i + 1, 0, 9, mat, 10, sudokuState);
            intersLineeQuadri(i, i + 1, 0, 9, mat, 10, sudokuState);
        }
    }

    if (sudokuState.colonneChecked) {
        for (let j = 0; j < 9; j++) {
            cercaNplette(0, 9, j, j + 1, mat, 11, sudokuState);
            intersLineeQuadri(0, 9, j, j + 1, mat, 11, sudokuState);
        }
    }

    if (sudokuState.quadriChecked) {
        for (let n = 0; n < 9; n++) {

            intersLineeQuadri(quad[n][0], quad[n][1], quad[n][2], quad[n][3], mat, n, sudokuState);
        }
    }
}

    const logMsg = (tipo, info) => {

		let memo = document.getElementById('memo1');

		memo.value += `--- ${ambito} ---\n`;
		memo.value += `${state.numop++} - ${tipo} -> ${info}\n`;
    };

    // 2. UNICITA'
    if (state.singoliChecked) {
		print=false;
		for (let i = 0; i < 9; i++) {
            if (sum[i] === 1) {
                for (let j = 0; j < 9; j++) {

    // 3. BI-UNICITÀ (Naked Pairs in row/col/box context)
    if (state.biunicitaChecked) {
     	//print=false;
        let vet_i = [], vet_j = [], vet_jj = [];

                vet_i.push(i);
                vet_j.push(positions[0]);
                vet_jj.push(positions[1]);

        }
        for (let n = 0; n < vet_i.length; n++) {
            for (let m = n + 1; m < vet_i.length; m++) {
                if (vet_j[n] === vet_j[m] && vet_jj[n] === vet_jj[m]) {
					//azzera le colonne j1 e jj1 di PosGrup
                    for (let i = 0; i < 9; i++) {
                        if (i !== vet_i[n] && i !== vet_i[m]) {
                            if (posGrup[i][vet_j[n]] || posGrup[i][vet_jj[n]]) {
								// DEVE STAMPARE
                                logMsg("BI-unicità", `Cifre ${vet_i[n]+1}${vet_i[m]+1} in pos ${vet_j[n]+1}${vet_jj[n]+1}`);
                            }
							//azzera le colonne j1 e jj1 di PosGrup
							posGrup[i][vet_j[n]] = 0;
							posGrup[i][vet_jj[n]] = 0;
                        }
                    }
                }
            }
        }

	// 4.  DOPPINI
	// Nota: Assumo che SudokuDoppini e SudokuTriplini siano gli ID delle  checkbox HTML
	//if (document.getElementById('SudokuDoppini').checked) {
	if (state.doppiniChecked) {

								vet_j[0] = j;
								vet_j[1] = jj;

								if (NumCifre(vet_j, vet_i, posGrup) == 3) {
									print = true;
									for (let nn = 0; nn < 9; nn++) {
										if (nn != j && nn != jj && nn != jjj) {

												}

									}
								}
							}

					}
				}
			}

	}
    // 6. RICODIFICA FINALE
    nn = 0;
    for (let i = imi; i < ima; i++) {
        for (let j = jmi; j < jma; j++) {
            let nuovePossib = [];
            for (let jj = 0; jj < 9; jj++) {
                if (posGrup[jj][nn] === 1) nuovePossib.push(jj + 1);
            }
            mat[i][j] = codifica(nuovePossib);
            nn++;
        }
    }
}

/**
 * Traduzione JS di IntersLineeQuadri
 * Gestisce le intersezioni tra Righe/Colonne e Quadrati (Pointing pairs/Box-Line reduction)
 */
function intersLineeQuadri(imi, ima, jmi, jma, mat, flag) {
    let print = false;
    let OKinters = false;
    let riga = false;
    let n, nn, nn1, i, ii, j, jj, jjj;
    let cifra, flagQ, iq, jq;
    
    // Inizializzazione strutture dati
    let PosGrup = Array.from({ length: 9 }, () => Array(9).fill(0));
    let Sum = new Array(9).fill(0);
    let SumCol = new Array(9).fill(0);
    let possib = new Array(10);
    let vet_i = new Array(10);
    let vet_j = new Array(10).fill(10);
    let imi2, ima2, jmi2, jma2;
	
    const logMsg = (tipo, info) => {
        if (!state.OKprint) return;
        let ambito = flag === 10 ? `## RIGA ${imi + 1}` : flag === 11 ? `## COLONNA ${jmi + 1}` : `## QUADRO ${flag + 1}`;
        //console.log(`--- ${ambito} ---`);
        //console.log(`${state.numop++} - ${tipo} -> ${info}`);
		
		// Accediamo all'elemento memo1
		let memo = document.getElementById('memo1');

		// Usiamo += e i backtick `
		memo.value += `--- ${ambito} ---\n`;
		memo.value += `${state.numop++} - ${tipo} -> ${info}\n`;
    };


    // Controllo se la checkbox è attiva
    if (!state.checkIntersChecked) return;

    // 1. Codifica le possibilità del gruppo corrente in PosGrup
    nn = 0;
    for (i = imi; i < ima; i++) {
        for (j = jmi; j < jma; j++) {
            let num = mat[i][j];
            // Assumo che Decodifica e Codifica siano disponibili globalmente
            let possib = decodifica(num); 
            for (n = 0; possib[n]!=0; n++) {
                jj = possib[n] - 1;
                PosGrup[jj][nn] = 1;
                Sum[jj]++;
                SumCol[nn]++;
            }
            nn++;
        }
    }

    // 2. Controlla se le presenze (2 o 3) sono confinate in un sottogruppo
    for (i = 0; i < 9; i++) {
        if (Sum[i] === 2 || Sum[i] === 3) {
            cifra = i; 
            vet_j.fill(10);
            jj = 0;
            for (j = 0; j < 9; j++) {
                if (PosGrup[i][j] === 1) {
                    vet_j[jj] = j;
                    jj++;
                }
            }

            // Calcolo distanze
            if (Sum[i] === 2) { nn = vet_j[1] - vet_j[0]; nn1 = 0; }
            if (Sum[i] === 3) { nn = vet_j[2] - vet_j[0]; nn1 = vet_j[1] - vet_j[0]; }

            // Logica di intersezione
            if ((nn === 1 && vet_j[0] % 3 < 2) || (nn === 2 && vet_j[0] % 3 === 0)) {
                OKinters = true;
                if (flag === 10) { // RIGA
                    iq = Math.floor(imi / 3);
                    jq = Math.floor(vet_j[0] / 3);
                    imi2 = iq * 3; ima2 = imi2 + 3;
                    jmi2 = jq * 3; jma2 = jmi2 + 3;
                    vet_i[0] = (imi % 3) * 3;
                    vet_i[1] = vet_i[0] + 1;
                    vet_i[2] = vet_i[1] + 1;
                    flagQ = iq * 3 + jq + 1;
                    break;
                } else if (flag === 11) { // COLONNA
                    iq = Math.floor(vet_j[0] / 3);
                    jq = Math.floor(jmi / 3);
                    imi2 = iq * 3; ima2 = imi2 + 3;
                    jmi2 = jq * 3; jma2 = jmi2 + 3;
                    vet_i[0] = jmi % 3;
                    vet_i[1] = vet_i[0] + 3;
                    vet_i[2] = vet_i[1] + 3;
                    flagQ = iq * 3 + jq + 1;
                    break;
                } else { // QUADRO attraversa riga
                    riga = true;
                    iq = Math.floor(vet_j[0] / 3);
                    imi2 = imi + iq; ima2 = imi2 + 1;
                    jmi2 = 0; jma2 = 9;
                    vet_i[0] = jmi;
                    vet_i[1] = jmi + 1;
                    vet_i[2] = jmi + 2;
                    break;
                }
            } else if ((nn === 3 && nn1 === 0) || (nn === 6 && nn1 === 3)) {
                if (flag < 10) { // QUADRO attraversa colonna
                    OKinters = true;
                    riga = false;
                    jq = vet_j[0] % 3;
                    jmi2 = jmi + jq; jma2 = jmi2 + 1;
                    imi2 = 0; ima2 = 9;
                    vet_i[0] = imi;
                    vet_i[1] = imi + 1;
                    vet_i[2] = imi + 2;
                    break;
                }
            }
        }
    }


    // 3. Applica le modifiche nel secondo dominio
    if (OKinters) {
        // Reset e ricarica dati per il secondo dominio (imi2, ima2, jmi2, jma2)
        PosGrup = Array.from({ length: 9 }, () => Array(9).fill(0));
		Sum =  Array(9).fill(0);
		SumCol =  Array(9).fill(0);
        nn = 0;
        for (i = imi2; i < ima2; i++) {
            for (j = jmi2; j < jma2; j++) {
                let possib = decodifica(mat[i][j]);
 
				for ( n=0;possib[n]!=0;n++){
					jj=  possib[n]-1;
					PosGrup[jj][nn]= 1;
					Sum[jj]= Sum[jj]+1;
					SumCol[nn]= SumCol[nn]+1;
				}
                nn++;
            }
        }

        // Elimina la cifra dove non consentita
        print = false;
        let n_idx = 0;
        for (j = 0; j < 9; j++) {
            if (j === vet_i[n_idx]) {
                n_idx++;
            } else {
                if (PosGrup[cifra][j] !== 0) {
                    print = true;
                    PosGrup[cifra][j] = 0;
                }
            }
        }

        if (print) {
            // Generazione log usando la logMsg JavaScript
            let infoIncompat = `${cifra + 1}`;
            if (flag > 9) {
                infoIncompat += ` in quadro ${flagQ}`;
            } else {
                infoIncompat += riga ? ` in riga ${imi2 + 1}` : ` in col. ${jmi2 + 1}`;
            }
            
            logMsg("Incompatib.", infoIncompat);

            // 4. Ricodifica le celle
            nn = 0;
            for (i = imi2; i < ima2; i++) {
                for (j = jmi2; j < jma2; j++) {
                    let nuovePossib = [];
                    for (jj = 0; jj < 9; jj++) {
                        if (PosGrup[jj][nn] === 1) nuovePossib.push(jj + 1);
                    }
                    mat[i][j] = codifica(nuovePossib);
                    nn++;
                }
            }
        }
    }
}

function codifica(possibArray) {
    let num = 0;
    // Iteriamo sull'array finché non troviamo uno 0 o finisce l'array
    for (let i = 0; i < possibArray.length; i++) {
        if (possibArray[i] === 0) break;
        num = num * 10 + possibArray[i];
    }
    return num;
}
function decodifica(num) {
    // Inizializziamo un array di 10 elementi con 0 (per compatibilità col tuo C++)
    let possib = new Array(10).fill(0);
    if (num === 0) return possib;

    let sNum = num.toString();
    for (let i = 0; i < sNum.length; i++) {
        possib[i] = parseInt(sNum[i]);
    }
    return possib;
}
function eliminaDaPossib(possibArray, cifra) {
    // Filtriamo l'array: teniamo solo i numeri diversi dalla cifra da eliminare
    // e diversi da zero (per pulizia)
    let nuovo = possibArray.filter(n => n !== cifra && n !== 0);
    
    // Ricostruiamo la struttura a 10 elementi con lo zero finale come nel tuo C++
    let risultato = new Array(10).fill(0);
    for (let i = 0; i < nuovo.length; i++) {
        risultato[i] = nuovo[i];
    }
    return risultato;
}
function numCifre_old(vet_j, vet_i, posGrup) {
    let nn = 0;
    // vet_i deve essere resettato o inizializzato esternamente
    for (let i = 0; i < 9; i++) {
        let esiste = false;
        
        for (let n = 0; n < 9 && vet_j[n] !== 10; n++) {
            let colonna = vet_j[n];
            if (posGrup[i][colonna] === 1) {
                esiste = true;
                break; // Trovata, possiamo passare alla prossima riga i
            }
        }
        
        if (esiste) {
            vet_i[nn] = i;
            nn++;
        }
    }
    return nn;
}

// Funzione NumCifre tradotta in JS
const NumCifre = (vet_j, vet_i, PosGrup) => {
    let nn = 0;
    for (let i = 0; i < 9; i++) {
        let esiste = false;
        for (let n = 0; n < 9 && vet_j[n] !== 10; n++) {
            esiste = esiste || PosGrup[i][vet_j[n]];
        }
        if (esiste) {
            vet_i[nn] = i;
            nn++;
        }
    }
    return nn;
};

//  SOMMA DEGLI ELEMENTI DELLA MATRICE
function sommaMatrice(mat) {
    let somma = 0;
    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            // Aggiungiamo il valore assicurandoci che sia un numero
            somma += Number(mat[i][j]) || 0;
        }
    }
    return somma;
}

//  CONTA GLI ELEMENTI DELLA MATRICE
function sommaCifre(mat) {
    let somma = 0;
    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            // Aggiungiamo il valore assicurandoci che sia un numero
            somma += (mat[i][j]!=0);
        }
    }
    return somma;
}

function copiaMatrice(da, a) {
    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            a[i][j] = da[i][j];
        }
    }
}

 */
function togli1() {

	let mat_0 = Array(9).fill().map(() => Array(9).fill(0));
    let mat = getMatriceDallaGriglia();
	let val_1;
	let val_2;
    //okPrint = false;

        let i = Math.floor(Math.random() * 9);

			n++;

			// Ripristina mat per il prossimo tentativo
			mat[i][j] = val_1;
            applicaSimmetria(i, j, val_2, mat);

        // Richiama se stessa dopo 10ms per il prossimo step
        // Questo "pausa" permette al browser di aggiornare la griglia
        setTimeout(eseguiStep, 10);		
    }
	eseguiStep();
    //updateProgressBar(0);
}

async function togli2() {
    // ... (le tue variabili iniziali restano uguali) ...
	let mat_0 = Array(9).fill().map(() => Array(9).fill(0));
    let mat = getMatriceDallaGriglia();
	let val_1;
	let val_2;
    //okPrint = false;
	let n = 0;
    const maxTentativi = 300;
    const maxSommaUguale = 8;
	let somma_old= 0;
	let numSommaUguale= 0;



    // Definiamo una funzione di pausa interna
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    if(mat[0][0] == 123456789) {
        document.getElementById('memo1').value = `Inserire almeno un numero`;
        return;
    }

    // Trasformiamo il ciclo in un loop standard ma asincrono
    while (n < maxTentativi) {
        let i = Math.floor(Math.random() * 9);
        let j = Math.floor(Math.random() * 9);

        if (mat[i][j] === 0) {
            n++;
            continue; // Salta il resto e ricomincia il ciclo while
        }

        // --- Logica di rimozione ---
        val_1 = mat[i][j];
        mat[i][j] = 0;
        val_2 = applicaSimmetria(i, j, 0, mat);
        
        scriviMatriceSuGriglia(mat, mat, "green");
        let somma = risolviTutto(); 
        scriviMatriceSuGriglia(mat, mat_0, "red");

        if (somma !== 405) {
            mat[i][j] = val_1;
            applicaSimmetria(i, j, val_2, mat);
        } else {
            let sommaAttuale = sommaMatrice(mat);
            if (sommaAttuale == somma_old) {
                numSommaUguale++;
                if(numSommaUguale >= maxSommaUguale) break; // Esci dal ciclo
            } else {
                somma_old = sommaAttuale;
                numSommaUguale = 0;
            }
        }

        n++;
        document.getElementById('memo1').value = `Passo attuale: ${n}\n`;

        // PAUSA: Permette al browser di respirare e aggiornare la grafica
        await sleep(10); 
    }

    // Questo codice viene eseguito SOLO UNA VOLTA alla fine del ciclo
    let numCifre = sommaCifre(mat);
    document.getElementById('memo1').value += `Lavoro Finito al Passo : ${n}\n`;    
    document.getElementById('memo1').value += `Lavoro finito (${numCifre} cifre)\n`;
    scriviMatriceSuGriglia(mat, mat, "black");
    state.numop = 0;
}

/**
 * Gestione delle simmetrie
 */
function applicaSimmetria(i, j, valore, mat) {
	let val_prima= 0;
	let simmetria = 3;
    if (simmetria === 1) mat[j][i] = valore;           // Diagonale
    if (simmetria === 2) mat[i][8 - j] = valore;       // Specchio Orizzontale
    if (simmetria === 3) {
		val_prima= mat[8 - i][8 - j];
		mat[8 - i][8 - j] = valore;   // Rotazionale
	}
	return val_prima;
}

async function togliTutto() { // 1. Aggiunto async
    let mat_0 = Array(9).fill().map(() => Array(9).fill(0));
    let mat = getMatriceDallaGriglia();
    let val_1;
    
    // Definizione locale della funzione di pausa
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            if (mat[i][j] === 0) {
                continue;
            }

            // --- FASE 1: Tentativo di rimozione ---
            val_1 = mat[i][j];
            mat[i][j] = 0;

            // Aggiorna la griglia visivamente (colore rosso per il tentativo)
            scriviMatriceSuGriglia(mat, mat_0, "red");
            
            // 2. PAUSA: Senza questa, il browser non mostrerebbe mai il rosso
            await sleep(10); 

            // --- FASE 2: Verifica risolvibilità ---
            let somma = risolviTutto(); 

            // Se il Sudoku non è più risolvibile univocamente
            if (somma !== 405) {
                // Ripristina il valore originale
                mat[i][j] = val_1;
                scriviMatriceSuGriglia(mat, mat_0, "black"); // Torna nero se ripristinato
                
                // Opzionale: un'altra piccola pausa per vedere il ripristino
                // await sleep(5); 
            }
        }
    }

    // --- FASE FINALE ---
    state.numop = 0;
    let numCifre = sommaCifre(mat);
    document.getElementById('memo1').value = `Lavoro finito (${numCifre} cifre)\n`;
    
    // Visualizzazione finale pulita
    scriviMatriceSuGriglia(mat, mat_0, "black");
}

function salvaSuDatabase(nomeSudoku, livello) {
    let mat = getMatriceDallaGriglia();
    const stringaSudoku = mat.flat().join('');

    const dati = new FormData();
    dati.append('nome', nomeSudoku);
    dati.append('schema', stringaSudoku); // 'schema' deve corrispondere a $_POST['schema'] in PHP
    dati.append('livello', livello);

    fetch('api_sudoku.php?azione=salva', {
        method: 'POST',
        body: dati
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success") {
            //alert("Sudoku '" + nomeSudoku + "' registrato!");
            alert("Sudoku '" + nomeSudoku + "' " + data.message);
            // Opzionale: ricarica la lista nel menu a tendina per vedere subito il nuovo arrivato
            caricaListaSudoku();
        } else {
            alert("Errore: " + data.message);
        }
    })
    .catch(err => console.error("Errore invio:", err));
}

function caricaListaSudoku() {

}

function generaGrigliaHTML() {
    const table = document.getElementById('sudoku-grid');
    table.innerHTML = ""; // Pulisce la tabella se necessario

    for (let r = 0; r < 9; r++) {
        let tr = document.createElement('tr');
        for (let c = 0; c < 9; c++) {
            let td = document.createElement('td');
            
            // Applichiamo le classi per i bordi (logica presa dal tuo file originale)
            if ((c + 1) % 3 === 0) td.className += " thick-right";
            if ((r + 1) % 3 === 0) td.className += " thick-bottom";
            if (c === 0) td.className += " thick-left";
            if (r === 0) td.className += " thick-top";

            let input = document.createElement('input');
            input.type = "number";
            input.min = 1;
            input.max = 9;
            input.id = `cell-${r}-${c}`;
            input.autocomplete = "off";
            
            td.appendChild(input);
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }
}

document.getElementById('menu-sudoku').addEventListener('change', function() {
    const idScelto = this.value;
    if (!idScelto) return; // Se sceglie l'opzione vuota, non fare nulla

    fetch(`api_sudoku.php?azione=carica&id=${idScelto}`)
        .then(res => res.json())
        .then(sudoku => {
            console.log("Dati caricati:", sudoku.schema_iniziale);
            
            let stringaDalDB = sudoku.schema_iniziale;
            let matrice = [];

            for (let i = 0; i < 9; i++) {
                // In JS si usa .substring(inizio, fine)
                let rigaDati = stringaDalDB.substring(i * 9, (i * 9) + 9);
                
                // In JS .split('') trasforma la stringa in array di caratteri
                // .map(Number) trasforma i caratteri in numeri veri
                matrice[i] = rigaDati.split('').map(Number);
            }

            // Richiamo la tua funzione per disegnare
            scriviMatriceSuGriglia(matrice, matrice, "black");
        })
        .catch(err => console.error("Errore nel caricamento:", err));
});

function preparaSalvataggio() {
    // 1. Prendo i valori inseriti dall'utente
    const nome = document.getElementById('input-nome').value;
    const livello = document.getElementById('select-livello').value;

    // 2. Controllo che il nome non sia vuoto
    if (nome.trim() === "") {
        alert("Per favore, inserisci un nome per il Sudoku!");
        return;
    }

    // 3. Chiamo la tua funzione di salvataggio passando i dati reali
    // Assicurati che 'salvaSuDatabase' sia quella che usa FormData
    salvaSuDatabase(nome, livello);
}

function salvaStatoAttuale(mat) {
    // Salviamo una copia profonda della matrice
    // Limitiamo la cronologia a 10 passaggi per non occupare troppa memoria
    if (cronologiaStati.length > 10) {
        cronologiaStati.shift(); // Rimuove il più vecchio
    }
    cronologiaStati.push(structuredClone(mat));
}

function comandoIndietro() {
    if (cronologiaStati.length > 0) {
        // Prendi l'ultimo stato salvato (e rimuovilo dalla pila)
        let matricePrecedente = cronologiaStati.pop();

        // Ripristina la griglia con i vecchi valori
        aggiornaGriglia(matricePrecedente);
        
        console.log("Stato ripristinato. Stati rimanenti in memoria: " + cronologiaStati.length);
    } else {
        alert("Nessun altro passaggio da annullare!");
    }
}

function aggiornaGriglia(mat) {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            let cella = document.getElementById(`cell-${r}-${c}`);
            cella.value = mat[r][c] === 0 ? "" : mat[r][c];
        }
    }
}
